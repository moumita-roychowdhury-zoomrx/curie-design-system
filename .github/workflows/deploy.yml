name: Deploy to GitHub Pages

# Builds the Eleventy site in the cloud and publishes it to GitHub Pages.
# You never run Eleventy locally — pushing to main is the whole workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build tokens
        run: node scripts/build-tokens.js
      - name: Build site (GitHub Pages subpath)
        # --pathprefix makes every internal URL resolve under /curie-design-system/
        run: npx @11ty/eleventy --pathprefix="/curie-design-system/"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
